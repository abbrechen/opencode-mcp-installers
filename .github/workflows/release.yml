name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run CI test
        run: bash dev/figma-remote/test-ci.sh

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build files
        run: |
          mkdir -p dist
          # Find all .sh files in installers/ and subdirectories, copy to dist/ as .command
          find installers -name '*.sh' -exec sh -c '
            for f; do
              rel="${f#installers/}"
              dest="dist/${rel%.sh}.command"
              mkdir -p "$(dirname "$dest")"
              cp "$f" "$dest"
              chmod +x "$dest"
            done
          ' sh {} +
          zip -r dist/installers.zip dist/*.command dist/**/*.command 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/installers.zip
