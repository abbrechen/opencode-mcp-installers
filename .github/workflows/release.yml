name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build files
        run: |
          mkdir -p dist
          for sh_file in $(find installers -name '*.sh'); do
            rel="${sh_file#installers/}"
            dir_name="${rel%/*}"
            base_name="${rel##*/}"
            base_name="${base_name%.sh}.command"
            mkdir -p "dist/$dir_name"
            cp "$sh_file" "dist/$dir_name/$base_name"
            chmod +x "dist/$dir_name/$base_name"
            zip_name="$(echo "$rel" | tr '/' '_')".command.zip
            (cd dist && zip "$zip_name" "$dir_name/$base_name")
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
