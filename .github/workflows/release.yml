name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build files
        run: |
          source installers/lib/opencode-lib.sh
          mkdir -p dist
          for sh_file in $(find installers -name 'install-*.sh'); do
            base_name="$(basename "$sh_file")"
            # Füge "mcp" in den Namen ein: install-blender-macos → install-blender-mcp-macos
            name_no_ext="$(basename "$sh_file" .sh | sed 's/-macos/-mcp-macos/')"
            version="$(sed -n 's/^# Version: *//p' "$sh_file")"
            zip_name="${name_no_ext}-${version}.zip"
            bundle_dir="dist/${zip_name%.zip}"
            create_bundle "$sh_file" "$bundle_dir"
            (cd "$bundle_dir" && zip -r "../$zip_name" .)
            rm -rf "$bundle_dir"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
